<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>POINTAGE ALREST</title>
    <style>
        :root { --blue: #1e3a8a; --green: #15803d; --red: #b91c1c; --sky: #0369a1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 1150px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--blue); text-transform: uppercase; margin-top: 0; }
        .header-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .error-field { border: 2px solid var(--red) !important; background-color: #fff1f2 !important; }

        .period-section { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .period-header { font-weight: bold; color: var(--blue); display: block; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; }
        .period-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 15px; align-items: end; }
        .history-zone { margin-top: 15px; padding: 10px; background: white; border-radius: 8px; border: 1px dashed #cbd5e1; }
        .history-item { display: inline-block; background: #e0e7ff; color: #1e40af; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-right: 10px; margin-bottom: 5px; font-weight: bold; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 20px 0; }
        .stat-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; font-weight: bold; }
        .stat-val { font-size: 18px; display: block; margin-top: 5px; font-weight: 800; }

        .row-pointage { display: grid; grid-template-columns: 2fr 0.8fr 1fr 1fr 1fr 1fr 1.2fr; padding: 8px; border-bottom: 1px solid #eee; align-items: center; text-align: center; }
        .header-table { background: var(--blue); color: white; font-weight: bold; border-radius: 6px; }
        .weekend-row { background: #fff5f5; color: var(--red); }
        .ferie-row { background: #f0fdf4 !important; color: var(--green) !important; font-weight: bold; }
        .conge-row { background: #f0f9ff !important; color: var(--sky) !important; font-weight: bold; }

        .action-btns { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 15px; transition: 0.3s; }
        .btn-excel { background: #166534; color: white; flex: 2; font-size: 18px; }
        .btn-reset { background: #64748b; color: white; flex: 1; }
        .btn-apply { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>POINTAGE ALREST</h2>

    <div class="header-inputs">
        <input type="text" id="nom" placeholder="NOM" oninput="this.value = this.value.toUpperCase(); this.classList.remove('error-field')">
        <input type="text" id="prenom" placeholder="Prénom" oninput="formatPrenom(this); this.classList.remove('error-field')">
        <input type="text" id="post" placeholder="FONCTION" oninput="this.value = this.value.toUpperCase(); this.classList.remove('error-field')">
        <input type="date" id="d1" onchange="verifierAuto()">
        <input type="date" id="d2" onchange="verifierAuto()">
    </div>

    <div id="zonePeriodes" style="display:none;" class="period-section">
        <div class="period-header">APPLIQUER UNE PÉRIODE SPÉCIALE</div>
        <div class="period-grid">
            <div><select id="typeSelect"><option value="Férié">JOUR FÉRIÉ</option><option value="Congé">CONGÉ</option><option value="Normal">TRAVAIL NORMAL</option></select></div>
            <div><label style="font-size:10px">DU</label><input type="date" id="pStart"></div>
            <div><label style="font-size:10px">AU</label><input type="date" id="pEnd"></div>
            <button class="btn btn-apply" onclick="appliquerPeriode()">APPLIQUER</button>
        </div>
        <div id="historyZone" class="history-zone" style="display:none;"><div id="historyList"></div></div>
    </div>

    <div id="action-top" style="display:none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-excel" onclick="exporterExcel()">TELECHARGER LE POINTAGE</button>
        <button class="btn btn-reset" onclick="window.location.reload()">EFFACER TOUT</button>
    </div>

    <div id="zonePointage" style="display:none;">
        <div class="stats-bar">
            <div class="stat-box" style="color:var(--green)">Travaillés<br><span class="stat-val" id="stJ">0</span></div>
            <div class="stat-box" style="color:orange">W-E Trav.<br><span class="stat-val" id="stWET">0</span></div>
            <div class="stat-box" style="color:var(--sky)">Congés<br><span class="stat-val" id="stCon">0</span></div>
            <div class="stat-box" style="color:var(--green)">Fériés<br><span class="stat-val" id="stFer">0</span></div>
            <div class="stat-box" style="color:var(--red)">Absences<br><span class="stat-val" id="stAbsJ">0</span></div>
            <div class="stat-box" style="color:var(--blue)">H. Totales<br><span class="stat-val" id="stH">0h</span></div>
            <div class="stat-box" style="color:orange">H. Sup<br><span class="stat-val" id="stS">0h</span></div>
        </div>
        <div class="row-pointage header-table">
            <div>Date</div><div>Statut</div><div>Début</div><div>Fin</div><div>Heures</div><div>H. Sup</div><div>Type Jour</div>
        </div>
        <div id="corps-table"></div>
    </div>
</div>

<script>
    function formatPrenom(i){ if(i.value.length>0) i.value=i.value.charAt(0).toUpperCase()+i.value.slice(1).toLowerCase(); }
    
    // Correction de la conversion en minutes (Bug 0.1 fixé)
    function toMin(t){ 
        if(!t) return 0; 
        const parts = t.split(':'); 
        return (parseInt(parts[0], 10) * 60) + parseInt(parts[1], 10); 
    }

    function verifierAuto(){ const d1=document.getElementById('d1').value, d2=document.getElementById('d2').value; if(d1 && d2) genererCalendrier(); }

    function genererCalendrier() {
        const start=new Date(document.getElementById('d1').value), end=new Date(document.getElementById('d2').value);
        if(start>end)return;
        const corps=document.getElementById('corps-table'); corps.innerHTML="";
        let c=new Date(start);
        while(c<=end){
            const js=c.getDay(), ouv=(js>=0 && js <= 4), dISO=c.toISOString().split('T')[0], dStr=c.toLocaleDateString('fr-FR',{weekday:'short', day:'numeric', month:'short'});
            corps.innerHTML+=`<div class="row-pointage ${!ouv?'weekend-row':''}" data-date="${dISO}" data-ouv="${ouv}">
                <div style="text-align:left"><b>${dStr}</b></div>
                <div><input type="checkbox" class="isP" ${ouv?'checked':''} onchange="majStats()"></div>
                <div><input type="time" class="t1" value="08:00" onchange="majStats()"></div>
                <div><input type="time" class="t2" value="16:00" onchange="majStats()"></div>
                <div class="resT">8.0h</div><div class="resS">0h</div>
                <div><select class="typeJ" onchange="majStats()"><option value="Normal">Travail</option><option value="Férié">Férié</option><option value="Congé">Congé</option></select></div>
            </div>`;
            c.setDate(c.getDate()+1);
        }
        document.getElementById('zonePointage').style.display='block';
        document.getElementById('zonePeriodes').style.display='block';
        document.getElementById('action-top').style.display='flex';
        majStats();
    }

    function appliquerPeriode() {
        const s=document.getElementById('pStart').value, e=document.getElementById('pEnd').value, t=document.getElementById('typeSelect').value;
        if(!s || !e) return alert("Dates manquantes");
        document.querySelectorAll('#corps-table .row-pointage').forEach(r => {
            const rd=r.getAttribute('data-date'), ouv=r.getAttribute('data-ouv')==="true";
            if(rd>=s && rd<=e && ouv){ r.querySelector('.typeJ').value=t; if(t!=="Normal") r.querySelector('.isP').checked=true; }
        });
        document.getElementById('historyZone').style.display='block';
        const span=document.createElement('span'); span.className='history-item'; span.innerText=`${t}: ${s} au ${e}`;
        document.getElementById('historyList').appendChild(span);
        majStats();
    }

    function majStats() {
        let presJ=0, absJ=0, hT=0, hS=0, ferJ=0, conJ=0, weT=0;
        document.querySelectorAll('#corps-table .row-pointage').forEach(r => {
            const p=r.querySelector('.isP').checked, ouv=r.getAttribute('data-ouv')==="true", type=r.querySelector('.typeJ').value;
            const m1=toMin(r.querySelector('.t1').value), m2=toMin(r.querySelector('.t2').value);
            
            // Calcul précis en minutes pour éviter les flottants
            let diffMin = p ? (m2 - m1) : 0;
            let th = diffMin / 60;
            let sh = (type === "Férié" || type === "Congé") ? 0 : Math.max(0, th - 8);

            r.querySelector('.resT').innerText = th.toFixed(1) + "h";
            r.querySelector('.resS').innerText = sh > 0 ? sh.toFixed(1) + "h" : "0h";
            
            r.classList.remove('ferie-row','conge-row');
            if(p){ 
                if(type==='Férié'){r.classList.add('ferie-row'); ferJ++;} else if(type==='Congé'){r.classList.add('conge-row'); conJ++;} else presJ++;
                hT+=th; hS+=sh; if(!ouv) weT++;
            } else if(ouv) absJ++;
        });
        document.getElementById('stJ').innerText=presJ; document.getElementById('stWET').innerText=weT;
        document.getElementById('stFer').innerText=ferJ; document.getElementById('stCon').innerText=conJ;
        document.getElementById('stAbsJ').innerText=absJ; 
        document.getElementById('stH').innerText=hT.toFixed(1).replace('.0','') + "h";
        document.getElementById('stS').innerText=hS.toFixed(1).replace('.0','') + "h";
    }

    function exporterExcel() {
        const n=document.getElementById('nom'), pr=document.getElementById('prenom'), f=document.getElementById('post');
        if(!n.value.trim()||!pr.value.trim()||!f.value.trim()){ [n,pr,f].forEach(el=>!el.value.trim()?el.classList.add('error-field'):null); return alert("Champs obligatoires !"); }
        
        const stats = [
            {l:"Jours Travaillés", v:document.getElementById('stJ').innerText, c:"#15803d"},
            {l:"Jours Congés", v:document.getElementById('stCon').innerText, c:"#0369a1"},
            {l:"Jours Fériés", v:document.getElementById('stFer').innerText, c:"#15803d"},
            {l:"Week-ends Trav.", v:document.getElementById('stWET').innerText, c:"#ea580c"},
            {l:"Absences", v:document.getElementById('stAbsJ').innerText, c:"#b91c1c"},
            {l:"Total Heures", v:document.getElementById('stH').innerText, c:"#000000"},
            {l:"Heures Sup", v:document.getElementById('stS').innerText, c:"#ea580c"}
        ];

        let html = `<html><head><meta charset="UTF-8"><style>
            .h { background-color:#1e3a8a; color:#ffffff; font-weight:bold; border:1px solid #000; text-align:center; }
            .stat-l { background-color:#f1f5f9; font-weight:bold; border:1px solid #000; }
            .weekend { background-color:#fff5f5; color:#ff0000; font-weight:bold; border:1px solid #000; }
            .ferie { background-color:#dcfce7; color:#15803d; font-weight:bold; border:1px solid #000; }
            .conge { background-color:#f0f9ff; color:#0369a1; font-weight:bold; border:1px solid #000; }
            .abs { background-color:#fee2e2; color:#b91c1c; border:1px solid #000; }
            .std { border:1px solid #000; text-align:center; }
        </style></head><body><table>`;

        html += `<tr><td colspan="6" style="font-weight:bold; font-size:14px;">${n.value} ${pr.value}</td><td style="width:20px;"></td><td colspan="2" class="h">RECAPITULATIF</td></tr>`;
        html += `<tr><td colspan="6" style="font-weight:bold;">FONCTION : ${f.value}</td><td></td><td class="stat-l">${stats[0].l}</td><td style="border:1px solid #000; font-weight:bold; text-align:center; color:${stats[0].c};">${stats[0].v}</td></tr>`;

        const rows = document.querySelectorAll('#corps-table .row-pointage');
        const max = Math.max(rows.length, stats.length - 1);

        for(let i=0; i<max; i++){
            html += "<tr>";
            if(i < rows.length){
                const r=rows[i], p=r.querySelector('.isP').checked, ouv=r.getAttribute('data-ouv')==="true", type=r.querySelector('.typeJ').value;
                let stat=p?(type==="Férié"?"FERIE":(type==="Congé"?"CONGE":"PRESENT")):(ouv?"ABSENT":"WEEK-END");
                let cls=type==="Férié"?"ferie":type==="Congé"?"conge":!ouv?"weekend":(!p&&ouv?"abs":"std");
                html += `<td class="${cls}">${r.querySelector('b').innerText}</td><td class="${cls}">${stat}</td><td class="${cls}">${r.querySelector('.t1').value}</td><td class="${cls}">${r.querySelector('.t2').value}</td><td class="${cls}">${r.querySelector('.resT').innerText}</td><td class="${cls}">${r.querySelector('.resS').innerText}</td>`;
            } else {
                html += `<td colspan="6" style="border:none;"></td>`;
            }

            html += `<td style="border:none;"></td>`;
            let sIdx = i + 1; // On a déjà mis stats[0] en haut
            if(sIdx < stats.length){
                html += `<td class="stat-l">${stats[sIdx].l}</td><td style="border:1px solid #000; font-weight:bold; text-align:center; color:${stats[sIdx].c};">${stats[sIdx].v}</td>`;
            }
            html += "</tr>";
        }
        html += `</table></body></html>`;
        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = `Pointage_${n.value}_${pr.value}_${f.value}.xls`; a.click();
    }
</script>
</body>
</html>
